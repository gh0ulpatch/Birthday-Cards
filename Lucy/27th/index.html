<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 27th, Lucy 💜</title>
    <style>
      :root {
        --bg1: #3b1362;
        --bg2: #5d1f87;
        --bg3: #9f58d4;
        --ink: #241337;
        --paper: #fffaf2;
        --envelope: #f1dbff;
        --envelope-dark: #dec2f4;
        --accent: #ffd166;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: #fff;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at 20% 20%, var(--bg3), transparent 45%),
          radial-gradient(circle at 80% 30%, #6b2ea0, transparent 35%),
          linear-gradient(135deg, var(--bg1), var(--bg2));
      }

      .screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .card {
        width: min(720px, 94vw);
        background: rgba(20, 7, 36, 0.68);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 18px;
        padding: 1.25rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      h1 { margin: 0 0 0.6rem; font-size: clamp(1.4rem, 3vw, 2rem); }
      p { margin: 0.35rem 0; line-height: 1.45; }

      #lyrics {
        min-height: 7rem;
        white-space: pre-line;
        font-weight: 500;
      }

      .controls {
        margin-top: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.68rem 1.05rem;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        color: #2b0f44;
        background: linear-gradient(180deg, #ffeeb8, var(--accent));
      }

      button.secondary {
        color: #fff;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .hidden { display: none !important; }

      #cardStage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      .envelope {
        position: relative;
        width: min(380px, 88vw);
        aspect-ratio: 10 / 7;
        pointer-events: auto;
        cursor: pointer;
        transform-style: preserve-3d;
      }

      .envelope-base {
        position: absolute;
        inset: 0;
        background: var(--envelope);
        border-radius: 0 0 16px 16px;
        box-shadow: 0 20px 30px rgba(0, 0, 0, 0.28);
      }

      .envelope-tri {
        position: absolute;
        width: 100%;
        height: 72%;
        bottom: 0;
        background: var(--envelope-dark);
        clip-path: polygon(0 100%, 50% 26%, 100% 100%);
      }

      .flap {
        position: absolute;
        width: 100%;
        height: 60%;
        top: 0;
        transform-origin: top center;
        background: #f7e7ff;
        clip-path: polygon(0 0, 50% 100%, 100% 0);
        transition: transform 900ms ease;
        z-index: 4;
      }

      .letter {
        position: absolute;
        left: 5%;
        width: 90%;
        bottom: 8%;
        height: 82%;
        background: var(--paper);
        color: var(--ink);
        border-radius: 12px;
        border: 1px solid #e6d5bc;
        padding: 1rem 1rem 0.85rem;
        overflow: auto;
        transform: translateY(58%);
        transition: transform 1s ease;
        z-index: 2;
      }

      .envelope.open .flap { transform: rotateX(178deg); }
      .envelope.open .letter { transform: translateY(0); }

      #message {
        white-space: pre-line;
        line-height: 1.5;
      }

      .gallery {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(110px, 1fr));
        gap: 0.75rem;
      }

      .polaroid {
        background: #fff;
        padding: 0.35rem 0.35rem 0.75rem;
        border-radius: 4px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.17);
      }

      .polaroid img {
        width: 100%;
        height: 100px;
        object-fit: cover;
        border-radius: 2px;
        display: block;
      }

      .animals {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .animal {
        position: absolute;
        font-size: clamp(1.35rem, 3.8vw, 2.2rem);
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.25));
        animation: roam linear infinite;
      }

      .a1 { animation-duration: 19s; }
      .a2 { animation-duration: 22s; animation-delay: -6s; }
      .a3 { animation-duration: 25s; animation-delay: -12s; }
      .a4 { animation-duration: 28s; animation-delay: -16s; }

      @keyframes roam {
        0% { transform: translate(8vw, 82vh); }
        25% { transform: translate(73vw, 68vh); }
        50% { transform: translate(65vw, 16vh); }
        75% { transform: translate(12vw, 28vh); }
        100% { transform: translate(8vw, 82vh); }
      }

      .hint {
        text-align: center;
        margin-top: 0.7rem;
        font-size: 0.9rem;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <section id="introScreen" class="screen">
      <div class="card">
        <h1>Happy Birthday, Lucy 🎂</h1>
        <p id="lyrics"></p>
        <div class="controls">
          <button id="startBtn">Start the card</button>
        </div>
        <p class="hint">Tip: audio starts after your click (browser autoplay rule).</p>
      </div>
    </section>

    <section id="cardStage" class="hidden">
      <div class="envelope" id="envelope" aria-label="Open envelope">
        <div class="flap"></div>
        <div class="envelope-base"></div>
        <div class="envelope-tri"></div>
        <article class="letter">
          <h2 style="margin: 0 0 0.55rem;">To my favorite adventurer 💜</h2>
          <p id="message"></p>
          <div class="gallery">
            <figure class="polaroid" style="transform: rotate(-4deg); margin: 0;">
              <img src="images/1.jpg" alt="Lucy memory 1" />
            </figure>
            <figure class="polaroid" style="transform: rotate(3deg); margin: 0;">
              <img src="images/2.jpg" alt="Lucy memory 2" />
            </figure>
          </div>
          <div class="controls">
            <button class="secondary" id="voiceBtn">Play voice note</button>
          </div>
        </article>
      </div>
    </section>

    <div class="animals hidden" id="animals">
      <span class="animal a1">🐈</span>
      <span class="animal a2">🦊</span>
      <span class="animal a3">🐕</span>
      <span class="animal a4">🐇</span>
    </div>

    <audio id="intro" src="audio/intro.mp3"></audio>
    <audio id="trumpet" src="audio/trumpet.mp3"></audio>
    <audio id="strings" src="audio/strings.mp3" loop></audio>
    <audio id="voice" src="audio/voice.mp3"></audio>

    <script>
      const lyricsText = [
        "Happy birthday to you,",
        "happy birthday to you,",
        "happy birthday dear Lucy,",
        "happy birthday to you.",
        "",
        "(and yes... this card has a dramatic soundtrack 🎺)",
      ].join("\n");

      const birthdayMessage =
        "You make life louder, brighter, and way more adventurous.\n\n" +
        "27 looks incredible on you. Thank you for every laugh, every memory, and every story that somehow starts normal and ends wild.\n\n" +
        "May this year bring giant wins, tiny everyday joys, and plenty of moments that make you stop and smile.\n\n" +
        "Happy Birthday, Luce. You are deeply loved.";

      const introScreen = document.getElementById("introScreen");
      const cardStage = document.getElementById("cardStage");
      const animals = document.getElementById("animals");
      const lyrics = document.getElementById("lyrics");
      const message = document.getElementById("message");
      const envelope = document.getElementById("envelope");

      const introAudio = document.getElementById("intro");
      const trumpetAudio = document.getElementById("trumpet");
      const stringsAudio = document.getElementById("strings");
      const voiceAudio = document.getElementById("voice");

      function typewriter(text, target, speed = 32) {
        target.textContent = "";
        let i = 0;
        const tick = () => {
          if (i >= text.length) return;
          target.textContent += text[i++];
          setTimeout(tick, speed);
        };
        tick();
      }

      function tryPlay(audioEl) {
        if (!audioEl) return;
        audioEl.currentTime = 0;
        audioEl.play().catch(() => {
          // Browser may still block playback; ignore silently.
        });
      }

      document.getElementById("startBtn").addEventListener("click", () => {
        typewriter(lyricsText, lyrics, 26);
        tryPlay(introAudio);

        setTimeout(() => {
          introScreen.classList.add("hidden");
          cardStage.classList.remove("hidden");
        }, 3100);
      });

      envelope.addEventListener("click", () => {
        if (envelope.classList.contains("open")) return;

        envelope.classList.add("open");

        introAudio.pause();
        tryPlay(trumpetAudio);

        setTimeout(() => {
          tryPlay(stringsAudio);
          animals.classList.remove("hidden");
          typewriter(birthdayMessage, message, 22);
        }, 1150);
      });

      document.getElementById("voiceBtn").addEventListener("click", () => {
        tryPlay(voiceAudio);
      });
    </script>
  </body>
</html>
