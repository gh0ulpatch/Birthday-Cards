<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 27th, Lucy 💜</title>
    <style>
      :root {
        --bg1: #2f1448;
        --bg2: #5f2a91;
        --bg3: #ae8adf;
        --card: #fffdf7;
        --ink: #2f1846;
        --accent: #ffd166;
        --accent-2: #ff7aa2;
        --env: #f4ddff;
        --env-dark: #ddbaff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #fff;
        overflow: hidden;
        background:
          radial-gradient(circle at 15% 20%, #bf9dff55, transparent 45%),
          radial-gradient(circle at 85% 10%, #ff95d055, transparent 40%),
          linear-gradient(145deg, var(--bg1), var(--bg2), #7b3bc0);
      }

      .screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
        transition: opacity 0.7s ease;
      }

      .hidden {
        opacity: 0;
        pointer-events: none;
      }

      .panel {
        width: min(780px, 94vw);
        border-radius: 20px;
        padding: 1.3rem;
        border: 1px solid #ffffff40;
        background: #160929b8;
        backdrop-filter: blur(2px);
        box-shadow: 0 25px 50px #00000040;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        margin-bottom: 0.7rem;
      }

      .lyrics {
        min-height: 9.2rem;
        line-height: 1.45;
        white-space: pre-line;
        margin-bottom: 0.8rem;
      }

      .hint {
        margin-top: 0.7rem;
        opacity: 0.84;
        font-size: 0.9rem;
      }

      .btn-row {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .btn {
        border: none;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(180deg, #fff0be, var(--accent));
        color: #371a59;
        box-shadow: 0 6px 14px #00000033;
      }

      .btn.secondary {
        background: #ffffff24;
        color: #fff;
        border: 1px solid #ffffff3f;
      }

      #cardStage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .envelope-wrap {
        position: relative;
        width: min(450px, 92vw);
        height: min(310px, 56vh);
        perspective: 1200px;
      }

      .envelope {
        position: absolute;
        inset: 0;
        cursor: pointer;
        transform-origin: center bottom;
      }

      .envelope.shake {
        animation: shake 0.55s ease;
      }

      @keyframes shake {
        0%,
        100% { transform: rotate(0deg); }
        20% { transform: rotate(1.7deg); }
        40% { transform: rotate(-1.6deg); }
        60% { transform: rotate(1.2deg); }
        80% { transform: rotate(-1deg); }
      }

      .base {
        position: absolute;
        inset: 0;
        border-radius: 0 0 20px 20px;
        background: var(--env);
        box-shadow: 0 18px 35px #0000004b;
      }

      .front {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 73%;
        background: var(--env-dark);
        clip-path: polygon(0 100%, 50% 18%, 100% 100%);
        z-index: 4;
      }

      .flap {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 58%;
        background: #f9ecff;
        clip-path: polygon(0 0, 50% 100%, 100% 0);
        transform-origin: top center;
        transition: transform 0.95s ease;
        z-index: 5;
      }

      .letter {
        position: absolute;
        left: 5%;
        right: 5%;
        top: 12%;
        height: 84%;
        border-radius: 14px;
        background: var(--card);
        color: var(--ink);
        border: 1px solid #ead8c0;
        padding: 1rem;
        overflow: auto;
        transform: translateY(60%);
        transition: transform 1.05s ease;
        z-index: 3;
      }

      .envelope.open .flap {
        transform: rotateX(180deg);
      }

      .envelope.open .letter {
        transform: translateY(-31%);
      }

      #letterText {
        min-height: 10rem;
        white-space: pre-line;
        line-height: 1.45;
      }

      .photo-stack {
        margin-top: 0.9rem;
        position: relative;
        min-height: 190px;
      }

      .polaroid {
        position: absolute;
        width: min(42vw, 150px);
        background: #fff;
        padding: 0.4rem 0.4rem 0.75rem;
        border-radius: 5px;
        box-shadow: 0 10px 16px #00000024;
      }

      .polaroid img {
        display: block;
        width: 100%;
        height: 115px;
        object-fit: cover;
        border-radius: 3px;
      }

      .p1 { left: 2%; top: 12px; transform: rotate(-7deg); z-index: 1; }
      .p2 { left: 33%; top: 0; transform: rotate(4deg); z-index: 3; }
      .p3 { left: 58%; top: 18px; transform: rotate(-2deg); z-index: 2; }

      .controls {
        margin-top: 0.7rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      #roastMsg {
        margin-top: 0.6rem;
        padding: 0.55rem 0.7rem;
        border-radius: 10px;
        color: #fff;
        background: linear-gradient(90deg, #ff5f6d, #ff8b4d);
        display: none;
      }

      #roastMsg.show {
        display: block;
      }

      #animalsLayer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .animal {
        position: absolute;
        font-size: clamp(1.3rem, 3vw, 2rem);
        filter: drop-shadow(0 2px 4px #0000004a);
      }

      #fireworks {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 6;
      }

      .burst {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        animation: pop 0.9s ease-out forwards;
      }

      @keyframes pop {
        0% {
          transform: scale(0.2);
          opacity: 1;
        }
        100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }

      @media (max-width: 640px) {
        .letter {
          padding: 0.85rem;
        }

        .photo-stack {
          min-height: 170px;
        }

        .polaroid {
          width: 38vw;
        }

        .p1 { left: 0; }
        .p2 { left: 28%; }
        .p3 { left: 56%; }
      }
    </style>
  </head>
  <body>
    <section id="introScreen" class="screen">
      <div class="panel">
        <h1>Lucy, this one is chaotic and heartfelt 💜</h1>
        <p class="lyrics" id="lyrics"></p>
        <div class="btn-row">
          <button class="btn" id="openBtn">Open your card</button>
        </div>
        <p class="hint">Click starts audio, then we slide into full envelope drama after a few seconds.</p>
      </div>
    </section>

    <section id="cardStage" class="screen hidden">
      <div class="envelope-wrap">
        <div id="envelope" class="envelope" aria-label="Open birthday envelope" role="button" tabindex="0">
          <div class="flap"></div>
          <div class="base"></div>
          <div class="front"></div>

          <article class="letter">
            <h2 style="margin-bottom: 0.5rem;">Happy 27th, Luce 🎂</h2>
            <p id="letterText"></p>

            <div class="photo-stack">
              <figure class="polaroid p1" style="margin: 0;">
                <img src="images/1.jpg" alt="Lucy photo 1" />
              </figure>
              <figure class="polaroid p2" style="margin: 0;">
                <img src="images/2.jpg" alt="Lucy photo 2" />
              </figure>
              <figure class="polaroid p3" style="margin: 0;">
                <img src="images/3.jpg" alt="Lucy photo 3" />
              </figure>
            </div>

            <div class="controls">
              <button class="btn secondary" id="playBirthdaySong">Play Birthday Song</button>
              <button class="btn secondary" id="roastToggle">🔥 Roast Mode</button>
            </div>
            <p id="roastMsg">Your camera roll is a crime scene.</p>
          </article>
        </div>
      </div>
    </section>

    <div id="animalsLayer" aria-hidden="true">
      <span class="animal" data-animal>🐱</span>
      <span class="animal" data-animal>🐱</span>
      <span class="animal" data-animal>🐶</span>
    </div>

    <div id="fireworks" aria-hidden="true"></div>

    <audio id="intro" src="audio/intro.mp3"></audio>
    <audio id="trumpet" src="audio/trumpet.mp3"></audio>
    <audio id="strings" src="audio/strings.mp3" loop></audio>
    <audio id="voice" src="audio/voice.mp3"></audio>

    <script>
      const introLyrics =
        "Happy birthday to you, happy birthday to you,\n" +
        "happy birthday dear Lucy, happy birthday to you.\n" +
        "You smell like a monkey and you look like one too.\n" +
        "Happy 27th!!";

      const letterTextExact =
        "I know we don't always see eye to eye — and I know I don't always make that easy. But you're my sister, and that doesn't change.\n\n" +
        "You're turning 27 and you've already done more with your life than most people manage in twice that. You've travelled half the world, you throw yourself into everything headfirst, and you've got a bigger heart than you'll ever give yourself credit for. Even if you do insist on cuddling every stray cat on three continents.\n\n" +
        "So here's a card full of the worst photos I could find of you. Consider it a gift.\n\n" +
        "Happy birthday, Luce. I mean it.";

      const introScreen = document.getElementById("introScreen");
      const cardStage = document.getElementById("cardStage");
      const lyricsEl = document.getElementById("lyrics");
      const envelopeEl = document.getElementById("envelope");
      const letterTextEl = document.getElementById("letterText");
      const fireworksEl = document.getElementById("fireworks");
      const roastMsg = document.getElementById("roastMsg");

      const introAudio = document.getElementById("intro");
      const trumpetAudio = document.getElementById("trumpet");
      const stringsAudio = document.getElementById("strings");
      const voiceAudio = document.getElementById("voice");

      const animalEls = Array.from(document.querySelectorAll("[data-animal]"));
      const animals = animalEls.map((el, i) => ({
        el,
        x: 80 + i * 120,
        y: 150 + i * 70,
        vx: (Math.random() * 1.2 + 0.8) * (Math.random() > 0.5 ? 1 : -1),
        vy: (Math.random() * 1.2 + 0.8) * (Math.random() > 0.5 ? 1 : -1),
      }));

      let introStarted = false;
      let envelopeOpened = false;

      function safePlay(audioEl, opts = {}) {
        if (!audioEl) return;
        if (opts.volume !== undefined) {
          audioEl.volume = opts.volume;
        }
        if (opts.restart !== false) {
          audioEl.currentTime = 0;
        }
        audioEl.play().catch(() => {});
      }

      function typeText(el, text, speed) {
        el.textContent = "";
        let i = 0;
        const tick = () => {
          if (i >= text.length) return;
          el.textContent += text[i++];
          setTimeout(tick, speed);
        };
        tick();
      }

      function launchFireworks() {
        const bursts = 28;
        const colors = ["#ff6f91", "#ffd166", "#8be9fd", "#c6ff8f", "#ff9ff3"];

        for (let i = 0; i < bursts; i += 1) {
          const b = document.createElement("span");
          b.className = "burst";
          b.style.left = `${Math.random() * 100}vw`;
          b.style.top = `${Math.random() * 65 + 5}vh`;
          b.style.background = colors[Math.floor(Math.random() * colors.length)];
          b.style.animationDelay = `${Math.random() * 0.25}s`;
          fireworksEl.appendChild(b);
          setTimeout(() => b.remove(), 1050);
        }
      }

      function openCardFlow() {
        if (envelopeOpened) return;
        envelopeOpened = true;

        envelopeEl.classList.add("shake");
        safePlay(trumpetAudio);

        setTimeout(() => {
          envelopeEl.classList.remove("shake");
          envelopeEl.classList.add("open");
          launchFireworks();

          safePlay(stringsAudio, { restart: false, volume: 0.33 });
          typeText(letterTextEl, letterTextExact, 17);
        }, 520);
      }

      function startIntro() {
        if (introStarted) return;
        introStarted = true;
        typeText(lyricsEl, introLyrics, 23);

        safePlay(introAudio);

        setTimeout(() => {
          introScreen.classList.add("hidden");
          cardStage.classList.remove("hidden");
        }, 5600);
      }

      function moveAnimals() {
        const maxX = window.innerWidth - 30;
        const maxY = window.innerHeight - 30;

        animals.forEach((a) => {
          if (Math.random() < 0.02) a.vx += (Math.random() - 0.5) * 0.5;
          if (Math.random() < 0.02) a.vy += (Math.random() - 0.5) * 0.5;

          a.vx = Math.max(-2.8, Math.min(2.8, a.vx));
          a.vy = Math.max(-2.8, Math.min(2.8, a.vy));

          a.x += a.vx;
          a.y += a.vy;

          if (a.x <= 0 || a.x >= maxX) {
            a.vx *= -1;
            a.x = Math.max(0, Math.min(maxX, a.x));
          }

          if (a.y <= 0 || a.y >= maxY) {
            a.vy *= -1;
            a.y = Math.max(0, Math.min(maxY, a.y));
          }

          a.el.style.transform = `translate(${a.x}px, ${a.y}px)`;
        });

        requestAnimationFrame(moveAnimals);
      }

      document.getElementById("openBtn").addEventListener("click", startIntro);

      envelopeEl.addEventListener("click", openCardFlow);
      envelopeEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openCardFlow();
        }
      });

      document.getElementById("playBirthdaySong").addEventListener("click", () => {
        safePlay(voiceAudio);
      });

      document.getElementById("roastToggle").addEventListener("click", () => {
        roastMsg.classList.toggle("show");
      });

      moveAnimals();
    </script>
  </body>
</html>
