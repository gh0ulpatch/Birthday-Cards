<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 27th Lucy 💜</title>
    <style>
      :root {
        --bg1: #35155d;
        --bg2: #5b2a86;
        --ink: #2d1b44;
        --paper: #fffdf8;
        --env: #efd7ff;
        --env-dark: #dab4fb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #fff;
        background:
          radial-gradient(circle at 18% 22%, #b48bff70, transparent 45%),
          radial-gradient(circle at 80% 8%, #ff9cc866, transparent 35%),
          linear-gradient(145deg, var(--bg1), var(--bg2));
      }
      .screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .hidden { display: none !important; }
      .panel {
        width: min(760px, 94vw);
        border-radius: 18px;
        border: 1px solid #ffffff36;
        background: #16082cbb;
        padding: 1.2rem;
        box-shadow: 0 18px 44px #00000045;
      }
      .lyrics {
        white-space: pre-line;
        min-height: 7.5rem;
        line-height: 1.45;
      }
      .hint { opacity: 0.82; font-size: 0.92rem; }
      .btn {
        border: none;
        border-radius: 999px;
        padding: 0.7rem 1.1rem;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.primary { color: #35155d; background: linear-gradient(180deg, #fff3c8, #ffd874); }
      .btn.alt { color: #fff; background: #ffffff22; border: 1px solid #ffffff3a; }
      #cardStage { z-index: 3; }
      .envelope {
        position: relative;
        width: min(430px, 92vw);
        height: min(300px, 56vh);
        cursor: pointer;
      }
      .envelope.shake { animation: shake 0.5s ease; }
      @keyframes shake {
        0%,100%{ transform: rotate(0deg);} 25%{ transform: rotate(1.5deg);} 50%{ transform: rotate(-1.2deg);} 75%{ transform: rotate(1deg);} }
      .base {
        position: absolute;
        inset: 0;
        background: var(--env);
        border-radius: 0 0 16px 16px;
        box-shadow: 0 16px 30px #0000004a;
      }
      .front {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 73%;
        background: var(--env-dark);
        clip-path: polygon(0 100%, 50% 20%, 100% 100%);
        z-index: 3;
      }
      .flap {
        position: absolute;
        left: 0; right: 0; top: 0;
        height: 58%;
        background: #f9ecff;
        clip-path: polygon(0 0, 50% 100%, 100% 0);
        transform-origin: top center;
        transition: transform .9s ease;
        z-index: 4;
      }
      .letter {
        position: absolute;
        left: 5%; right: 5%; top: 15%;
        height: 80%;
        background: var(--paper);
        color: var(--ink);
        border-radius: 12px;
        border: 1px solid #e6d6bf;
        padding: .95rem;
        overflow: auto;
        transform: translateY(58%);
        transition: transform 1s ease;
        z-index: 2;
      }
      .envelope.open .flap { transform: rotateX(180deg); }
      .envelope.open .letter { transform: translateY(-30%); }
      #message { white-space: pre-line; line-height: 1.5; min-height: 9rem; }
      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(80px, 1fr));
        gap: .45rem;
        margin-top: .8rem;
      }
      .gallery img {
        width: 100%;
        height: 95px;
        object-fit: cover;
        background: #eee;
        border-radius: 6px;
      }
      .controls { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .75rem; }
      #roastMsg { display: none; margin-top: .55rem; padding: .45rem .65rem; border-radius: 8px; background: #ff6b6b; color: #fff; }
      #roastMsg.show { display: block; }
      #animals { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
      .animal { position: absolute; font-size: clamp(1.2rem, 3vw, 2rem); }
      #fireworks { position: fixed; inset: 0; pointer-events: none; z-index: 8; }
      .spark {
        position: absolute;
        width: 9px; height: 9px; border-radius: 50%;
        animation: pop .85s ease-out forwards;
      }
      @keyframes pop { from { transform: scale(.2); opacity: 1; } to { transform: scale(2.8); opacity: 0; } }
    </style>
  </head>
  <body>
    <section id="intro" class="screen">
      <div class="panel">
        <h1>Happy Birthday Lucy 🎉</h1>
        <p id="lyrics" class="lyrics"></p>
        <button id="openCard" class="btn primary">Open your card</button>
        <p class="hint">Tap once to start the voice note, then we open the envelope in ~5.5 seconds.</p>
      </div>
    </section>

    <section id="cardStage" class="screen hidden">
      <div id="envelope" class="envelope" role="button" tabindex="0" aria-label="Open envelope">
        <div class="flap"></div>
        <div class="base"></div>
        <div class="front"></div>
        <article class="letter">
          <h2 style="margin:0 0 .5rem;">For Lucy, on your 27th 💜</h2>
          <p id="message"></p>
          <div class="gallery">
            <img src="images/1.jpg" alt="Photo 1" />
            <img src="images/2.jpg" alt="Photo 2" />
            <img src="images/3.jpg" alt="Photo 3" />
          </div>
          <div class="controls">
            <button id="playVoice" class="btn alt">Play Birthday Song</button>
            <button id="roast" class="btn alt">🔥 Roast Mode</button>
          </div>
          <p id="roastMsg">Your camera roll is a crime scene.</p>
        </article>
      </div>
    </section>

    <div id="animals" aria-hidden="true">
      <span class="animal" data-animal>🐱</span>
      <span class="animal" data-animal>🐱</span>
      <span class="animal" data-animal>🐶</span>
    </div>
    <div id="fireworks" aria-hidden="true"></div>

    <audio id="voice" src="audio/voice.mp3"></audio>

    <script>
      const introLyrics =
        "Happy birthday to you, happy birthday to you,\n" +
        "happy birthday dear Lucy, happy birthday to you.\n" +
        "You smell like a monkey and you look like one too.\n" +
        "Happy 27th!!";

      const letterText =
        "I know we don't always see eye to eye — and I know I don't always make that easy. But you're my sister, and that doesn't change.\n\n" +
        "You're turning 27 and you've already done more with your life than most people manage in twice that. You've travelled half the world, you throw yourself into everything headfirst, and you've got a bigger heart than you'll ever give yourself credit for.\n\n" +
        "So here's a card full of the worst photos I could find of you. Consider it a gift.\n\n" +
        "Happy birthday, Luce. I mean it.";

      const intro = document.getElementById("intro");
      const cardStage = document.getElementById("cardStage");
      const lyrics = document.getElementById("lyrics");
      const envelope = document.getElementById("envelope");
      const message = document.getElementById("message");
      const fireworks = document.getElementById("fireworks");
      const voice = document.getElementById("voice");
      const roastMsg = document.getElementById("roastMsg");

      let opened = false;
      let started = false;

      const animals = Array.from(document.querySelectorAll("[data-animal]"))
        .map((el, i) => ({
          el,
          x: 60 + i * 110,
          y: 100 + i * 90,
          vx: (Math.random() * 1.2 + 0.8) * (Math.random() > 0.5 ? 1 : -1),
          vy: (Math.random() * 1.2 + 0.8) * (Math.random() > 0.5 ? 1 : -1),
        }));

      function safePlay(audio) {
        if (!audio) return;
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }

      function typeText(el, text, speed = 24) {
        el.textContent = "";
        let i = 0;
        const tick = () => {
          if (i >= text.length) return;
          el.textContent += text[i++];
          setTimeout(tick, speed);
        };
        tick();
      }

      function sparkBurst() {
        const colors = ["#ffd166", "#ff8fab", "#8ef6ff", "#c5ff9a"];
        for (let i = 0; i < 24; i += 1) {
          const s = document.createElement("span");
          s.className = "spark";
          s.style.left = `${Math.random() * 100}vw`;
          s.style.top = `${Math.random() * 65 + 5}vh`;
          s.style.background = colors[Math.floor(Math.random() * colors.length)];
          fireworks.appendChild(s);
          setTimeout(() => s.remove(), 900);
        }
      }

      function startCard() {
        if (started) return;
        started = true;
        typeText(lyrics, introLyrics, 22);
        safePlay(voice);

        setTimeout(() => {
          intro.classList.add("hidden");
          cardStage.classList.remove("hidden");
        }, 5500);
      }

      function openEnvelope() {
        if (opened) return;
        opened = true;
        envelope.classList.add("shake");
        setTimeout(() => {
          envelope.classList.remove("shake");
          envelope.classList.add("open");
          sparkBurst();
          typeText(message, letterText, 16);
        }, 500);
      }

      function animateAnimals() {
        const maxX = window.innerWidth - 28;
        const maxY = window.innerHeight - 28;
        animals.forEach((a) => {
          if (Math.random() < 0.02) a.vx += (Math.random() - 0.5) * 0.4;
          if (Math.random() < 0.02) a.vy += (Math.random() - 0.5) * 0.4;
          a.vx = Math.max(-2.8, Math.min(2.8, a.vx));
          a.vy = Math.max(-2.8, Math.min(2.8, a.vy));
          a.x += a.vx;
          a.y += a.vy;
          if (a.x < 0 || a.x > maxX) { a.vx *= -1; a.x = Math.max(0, Math.min(maxX, a.x)); }
          if (a.y < 0 || a.y > maxY) { a.vy *= -1; a.y = Math.max(0, Math.min(maxY, a.y)); }
          a.el.style.transform = `translate(${a.x}px, ${a.y}px)`;
        });
        requestAnimationFrame(animateAnimals);
      }

      document.getElementById("openCard").addEventListener("click", startCard);
      document.getElementById("playVoice").addEventListener("click", () => safePlay(voice));
      document.getElementById("roast").addEventListener("click", () => roastMsg.classList.toggle("show"));
      envelope.addEventListener("click", openEnvelope);
      envelope.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openEnvelope();
        }
      });

      animateAnimals();
    </script>
  </body>
</html>
